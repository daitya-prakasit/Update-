<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Auto Text Replacer (AI OCR)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --primary-hover: #2563eb; --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f8fafc; }
        body { font-family: 'Hind', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: #94a3b8; margin: 0; font-size: 14px; }
        
        .toolbar { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 1100px; justify-content: center;}
        
        input[type="file"] { color: var(--text); font-size: 14px; cursor: pointer; width: 190px;}
        input[type="text"], select { background: #334155; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; outline: none; font-family: inherit;}
        input[type="color"] { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; height: 35px; width: 45px; padding: 2px; }
        input[type="number"] { background: #334155; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; width: 60px; outline: none;}

        button { background: var(--primary); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;}
        button:hover { background: var(--primary-hover); transform: translateY(-1px);}
        button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; transform: none;}
        
        .btn-snip { background: #ef4444; }
        .btn-snip:hover { background: #dc2626; }
        .btn-green { background: #10b981; }
        .btn-green:hover { background: #059669; }

        #status { background: #1e293b; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 1100px; text-align: center; transition: 0.3s; }
        .status-scanning { background: #b45309 !important; border-color: #f59e0b !important; color: #fef3c7 !important; }
        
        .canvas-container-wrapper { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; }
        
        .icon-btn { padding: 8px 12px; font-size: 16px; }
        .tool-group { display: flex; align-items: center; gap: 8px; padding: 0 10px; border-right: 1px solid var(--border); }
        .tool-group:last-child { border-right: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DAITYA Auto-Replacer</h1>
        <p>AI OCR Engine loaded. Type target text and replacement text. Zero manual selection.</p>
    </div>

    <div id="status">> Awaiting Image Upload.</div>

    <div class="toolbar">
        <div class="tool-group">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>
        
        <div class="tool-group">
            <input type="text" id="findText" placeholder="Find Text (Old)..." title="Exact text to search in the image">
            <input type="text" id="replaceText" placeholder="Replace With (New)..." title="Text to insert">
            <select id="fontFamily" title="Select Font">
                <option value="Hind">Hind</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times</option>
                <option value="Courier New">Courier</option>
                <option value="Verdana">Verdana</option>
            </select>
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
                <input type="checkbox" id="defaultBold" checked> Bold
            </label>
        </div>

        <div class="tool-group">
            <button class="btn-snip" id="btnAutoReplace" onclick="autoReplaceText()" disabled>⚡ Auto Replace</button>
        </div>

        <div class="tool-group">
            <input type="color" id="textColor" value="#ffffff" disabled title="Change Selected Text Color">
            <input type="number" id="textSize" value="20" disabled title="Change Selected Font Size">
            <button class="icon-btn" id="btnBold" onclick="toggleSelectedBold()" disabled title="Toggle Bold on Selected"><b>B</b></button>
            <button class="icon-btn" id="btnDelete" onclick="deleteSelected()" disabled title="Delete Selected">🗑️</button>
        </div>

        <button class="btn-green" id="btnDownload" onclick="downloadImage()" disabled style="margin-left: auto;">⬇ Download HD</button>
    </div>

    <div class="canvas-container-wrapper">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let canvas = new fabric.Canvas('editorCanvas', { selection: true });
        let originalImageElement = null; 
        let tempCanvasContext = null;
        let base64Image = null;

        function logStatus(msg, isScanning = false) { 
            statusEl.innerText = '> ' + msg; 
            if(isScanning) statusEl.classList.add('status-scanning');
            else statusEl.classList.remove('status-scanning');
        }

        // Load Image
        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(f) {
                    base64Image = f.target.result;
                    fabric.Image.fromURL(base64Image, function(img) {
                        canvas.clear();
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        
                        originalImageElement = new Image();
                        originalImageElement.src = base64Image;
                        originalImageElement.onload = () => {
                            let tempCanvas = document.createElement('canvas');
                            tempCanvas.width = img.width;
                            tempCanvas.height = img.height;
                            tempCanvasContext = tempCanvas.getContext('2d', { willReadFrequently: true });
                            tempCanvasContext.drawImage(originalImageElement, 0, 0);
                        };
                        
                        document.getElementById('btnAutoReplace').disabled = false;
                        document.getElementById('btnDownload').disabled = false;
                        logStatus('Image loaded. Enter text to find and replace, then click [⚡ Auto Replace].');
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // --- OCR Auto-Replace Logic ---
        async function autoReplaceText() {
            let targetText = document.getElementById('findText').value.trim();
            let newText = document.getElementById('replaceText').value.trim() || ' ';
            
            if (!targetText) {
                alert("Please enter the text you want to find!");
                return;
            }

            document.getElementById('btnAutoReplace').disabled = true;
            logStatus(`Scanning image for "${targetText}"... Please wait.`, true);

            try {
                // Initialize Tesseract worker
                const worker = await Tesseract.createWorker('eng');
                const ret = await worker.recognize(base64Image);
                await worker.terminate();

                let found = false;
                
                // Iterate through identified words
                for (let word of ret.data.words) {
                    // Simple case-insensitive match (you can upgrade to exact match if needed)
                    if (word.text.toLowerCase().includes(targetText.toLowerCase())) {
                        found = true;
                        let bbox = word.bbox;
                        let x = bbox.x0;
                        let y = bbox.y0;
                        let w = bbox.x1 - bbox.x0;
                        let h = bbox.y1 - bbox.y0;

                        // Add padding to bounding box to ensure full cover
                        x = Math.max(0, x - 2);
                        y = Math.max(0, y - 2);
                        w = w + 4;
                        h = h + 4;

                        replaceAtCoordinates(x, y, w, h, newText);
                    }
                }

                if (found) {
                    logStatus(`Success: Automatically replaced "${targetText}". You can edit the new text on canvas.`);
                } else {
                    logStatus(`Text "${targetText}" not found in image. Try checking spelling or case.`);
                }
            } catch (err) {
                console.error(err);
                logStatus("ERROR: OCR engine failed.");
            } finally {
                document.getElementById('btnAutoReplace').disabled = false;
            }
        }

        function replaceAtCoordinates(x, y, w, h, newText) {
            // Extract colors automatically
            let { bgColorHex, textColorHex } = extractStrictColors(x, y, w, h);

            // Create background mask
            let maskRect = new fabric.Rect({
                left: x, top: y, width: w, height: h,
                fill: bgColorHex, selectable: false, evented: false
            });
            canvas.add(maskRect);
            maskRect.sendToBack();

            // Insert New Text
            let selectedFont = document.getElementById('fontFamily').value;
            let isBold = document.getElementById('defaultBold').checked ? 'bold' : 'normal';

            let editableText = new fabric.IText(newText, {
                left: x, top: y, 
                fontSize: Math.round(h * 0.9), // Match height roughly
                fontFamily: selectedFont, 
                fill: textColorHex, 
                fontWeight: isBold,
                editable: true
            });

            canvas.add(editableText);
            canvas.setActiveObject(editableText);
            editableText.bringToFront();
        }

        // Color Extraction Engine (same as before)
        function extractStrictColors(x, y, w, h) {
            let p = 2; 
            const bgAreas = [
                { rx: x, ry: y, rw: p, rh: h }, { rx: x + w - p, ry: y, rw: p, rh: h },
                { rx: x, ry: y, rw: w, rh: p }, { rx: x, ry: y + h - p, rw: w, rh: p }
            ];

            let r=0, g=0, b=0, count=0;
            bgAreas.forEach(area => {
                if (area.rw > 0 && area.rh > 0 && area.rx < tempCanvasContext.canvas.width && area.ry < tempCanvasContext.canvas.height) {
                    let data = tempCanvasContext.getImageData(area.rx, area.ry, area.rw, area.rh).data;
                    for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
                }
            });
            let bgR = count > 0 ? Math.round(r/count) : 255; 
            let bgG = count > 0 ? Math.round(g/count) : 255; 
            let bgB = count > 0 ? Math.round(b/count) : 255;

            let textData = tempCanvasContext.getImageData(x, y, w, h).data;
            let maxContrast = [0,0,0]; let maxDist = -1;
            for (let i = 0; i < textData.length; i += 8) { 
                let dist = Math.sqrt(Math.pow(textData[i]-bgR, 2) + Math.pow(textData[i+1]-bgG, 2) + Math.pow(textData[i+2]-bgB, 2));
                if (dist > maxDist) { maxDist = dist; maxContrast = [textData[i], textData[i+1], textData[i+2]]; }
            }
            
            let txtHex = maxDist < 20 ? '#000000' : "#" + (1 << 24 | maxContrast[0] << 16 | maxContrast[1] << 8 | maxContrast[2]).toString(16).slice(1);
            let bgHex = "#" + (1 << 24 | bgR << 16 | bgG << 8 | bgB).toString(16).slice(1);
            
            return { bgColorHex: bgHex, textColorHex: txtHex };
        }

        // --- Live Edit UI ---
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            document.getElementById('textColor').disabled = true;
            document.getElementById('textSize').disabled = true;
            document.getElementById('btnBold').disabled = true; 
            document.getElementById('btnDelete').disabled = true;
        });

        function handleSelection(e) {
            const obj = e.selected[0];
            if (obj && obj.type === 'i-text') {
                document.getElementById('textColor').disabled = false;
                document.getElementById('textSize').disabled = false;
                document.getElementById('btnBold').disabled = false; 
                document.getElementById('btnDelete').disabled = false;
                
                document.getElementById('textColor').value = obj.fill || '#ffffff';
                document.getElementById('textSize').value = obj.fontSize || 20;
                document.getElementById('fontFamily').value = obj.fontFamily || 'Hind';
            }
        }

        // Toggle bold for selected text
        function toggleSelectedBold() {
            let activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                let currentWeight = activeObj.fontWeight;
                let newWeight = (currentWeight === 'bold' || currentWeight === 600 || currentWeight === 700) ? 'normal' : 'bold';
                activeObj.set('fontWeight', newWeight);
                canvas.renderAll();
            }
        }

        // Event Listeners for Live Editing
        document.getElementById('textColor').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fill', e.target.value); canvas.renderAll(); }
        });
        
        document.getElementById('textSize').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fontSize', parseInt(e.target.value)); canvas.renderAll(); }
        });

        document.getElementById('fontFamily').addEventListener('change', function(e) {
            if (canvas.getActiveObject() && canvas.getActiveObject().type === 'i-text') { 
                canvas.getActiveObject().set('fontFamily', e.target.value); 
                canvas.renderAll(); 
            }
        });

        function deleteSelected() {
            if (canvas.getActiveObject()) { 
                canvas.remove(canvas.getActiveObject()); 
                canvas.discardActiveObject();
            }
        }

        function downloadImage() {
            canvas.discardActiveObject(); canvas.renderAll();
            let link = document.createElement('a');
            link.download = 'DAITYA_AutoReplacer.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 }); 
            link.click();
        }
    </script>
</body>
</html>
