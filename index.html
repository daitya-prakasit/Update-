<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA OS - Premium Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --accent: #6d28d9;
            --accent-glow: rgba(109, 40, 217, 0.5);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(109, 40, 217, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #a78bfa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px;}
        .header p { color: var(--text-dim); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 0.5rem;}

        .layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; width: 100%; max-width: 1400px; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .upload-zone {
            border: 2px dashed rgba(109, 40, 217, 0.4);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .upload-zone:hover { border-color: #a78bfa; background: rgba(109, 40, 217, 0.05); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-text { font-size: 1rem; color: var(--text-dim); font-weight: 600; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            transition: all 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #4c1d95); color: white; box-shadow: 0 10px 20px -10px var(--accent); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 25px -10px var(--accent); filter: brightness(1.1); }
        .btn-success { background: linear-gradient(135deg, #059669, #047857); color: white; box-shadow: 0 10px 20px -10px #059669; }
        .btn-success:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 25px -10px #059669; filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; background: #1f2937; color: #6b7280; }

        .status-bar {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            backdrop-filter: blur(4px);
        }

        .canvas-container {
            width: 100%;
            height: calc(100vh - 150px);
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            cursor: crosshair;
            max-width: 100%;
            object-fit: contain;
            transition: transform 0.1s;
        }

        .color-data {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .color-swatch { width: 40px; height: 40px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .color-info { display: flex; flex-direction: column; justify-content: center;}
        .color-info span { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;}
        .color-info strong { font-size: 0.9rem; }

        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .canvas-container { height: 500px; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>DAITYA V2.0</h1>
        <p>Premium Image Synthesis & Payload Injection</p>
    </div>

    <div class="layout">
        <div class="glass-panel">
            <div id="status" class="status-bar">> Awaiting Payload...</div>

            <div class="upload-zone">
                <input type="file" id="imageInput" accept="image/*">
                <div class="upload-text">CLICK OR DROP IMAGE MATRIX</div>
            </div>

            <div class="form-group">
                <label>Target Signature (Auto-Detected)</label>
                <textarea id="sourceText" placeholder="Hover & click text on the image..." readonly></textarea>
            </div>

            <div class="form-group">
                <label>Injection Payload</label>
                <textarea id="injectionText" placeholder="Enter override text here..."></textarea>
            </div>

            <div class="color-data">
                <div style="display:flex; gap:10px;">
                    <div id="bgSwatch" class="color-swatch" style="background: #111;"></div>
                    <div class="color-info"><span>BG Mask</span><strong id="bgHex">#000000</strong></div>
                </div>
                <div style="display:flex; gap:10px; margin-left: auto;">
                    <div class="color-info" style="text-align: right;"><span>Text Color</span><strong id="textHex">#FFFFFF</strong></div>
                    <div id="textSwatch" class="color-swatch" style="background: #eee;"></div>
                </div>
            </div>

            <button class="btn btn-primary" id="btnExecute" onclick="executeInjection()" disabled>Deploy Override</button>
            <button class="btn btn-success" id="btnExport" onclick="exportPayload()" disabled>Export Final Payload</button>
        </div>

        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let rawImage = null;
        let memCanvas = null; 
        let scanData = [];
        let lockedTarget = null;
        let hoverTarget = null;

        const ui = {
            status: document.getElementById('status'),
            source: document.getElementById('sourceText'),
            inject: document.getElementById('injectionText'),
            btnExec: document.getElementById('btnExecute'),
            btnExp: document.getElementById('btnExport'),
            bgSwatch: document.getElementById('bgSwatch'),
            textSwatch: document.getElementById('textSwatch'),
            bgHex: document.getElementById('bgHex'),
            textHex: document.getElementById('textHex')
        };

        function log(msg, isError = false) {
            ui.status.style.display = 'block';
            ui.status.style.color = isError ? '#ef4444' : '#34d399';
            ui.status.style.background = isError ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)';
            ui.status.style.border = `1px solid ${isError ? 'rgba(239, 68, 68, 0.2)' : 'rgba(16, 185, 129, 0.2)'}`;
            ui.status.innerText = `> ${msg}`;
        }

        function rgbToHex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        // --- Core File Handling ---
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                rawImage = new Image();
                rawImage.onload = async () => {
                    // Set physical dimensions
                    canvas.width = rawImage.width;
                    canvas.height = rawImage.height;
                    
                    // Backup memory canvas for pure data read/writes
                    memCanvas = document.createElement('canvas');
                    memCanvas.width = rawImage.width;
                    memCanvas.height = rawImage.height;
                    memCanvas.getContext('2d', {willReadFrequently: true}).drawImage(rawImage, 0, 0);
                    
                    ctx.drawImage(rawImage, 0, 0);
                    lockedTarget = null;
                    ui.source.value = ''; ui.inject.value = '';

                    log('Analyzing matrix logic. Initializing Tesseract Engine...');
                    ui.btnExec.disabled = true; ui.btnExp.disabled = true;

                    try {
                        const { data } = await Tesseract.recognize(memCanvas, 'eng+hin', {
                            logger: m => { if(m.status === 'recognizing text') log(`Deep Scan: ${(m.progress * 100).toFixed(0)}%`); }
                        });
                        
                        // Filter out pure noise lines (confidence < 40 or empty)
                        scanData = data.lines.filter(l => l.confidence > 40 && l.text.trim().length > 0);
                        
                        log('Analysis Complete. Hover over text to view, click to lock target.');
                        ui.btnExp.disabled = false;
                        
                        // Setup interactions
                        setupCanvasInteractions();

                    } catch (err) {
                        log('Core Failure: ' + err.message, true);
                    }
                };
                rawImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- Interaction Engine ---
        function getScale() {
            const rect = canvas.getBoundingClientRect();
            return { x: canvas.width / rect.width, y: canvas.height / rect.height, rect };
        }

        function setupCanvasInteractions() {
            canvas.onmousemove = (e) => {
                if(lockedTarget) return; // Freeze hover if locked
                
                const s = getScale();
                const mx = (e.clientX - s.rect.left) * s.x;
                const my = (e.clientY - s.rect.top) * s.y;

                hoverTarget = scanData.find(l => mx >= l.bbox.x0 && mx <= l.bbox.x1 && my >= l.bbox.y0 && my <= l.bbox.y1);
                
                renderView(); // Redraw
            };

            canvas.onclick = (e) => {
                if(!hoverTarget && !lockedTarget) return;

                if(lockedTarget) {
                    // Unlock if clicking outside
                    const s = getScale();
                    const mx = (e.clientX - s.rect.left) * s.x;
                    const my = (e.clientY - s.rect.top) * s.y;
                    const l = lockedTarget.bbox;
                    if(mx < l.x0 || mx > l.x1 || my < l.y0 || my > l.y1) {
                        lockedTarget = null;
                        ui.source.value = ''; ui.inject.value = '';
                        ui.btnExec.disabled = true;
                        log('Target unlocked.');
                        renderView();
                        return;
                    }
                }

                if(hoverTarget) {
                    lockedTarget = hoverTarget;
                    hoverTarget = null;
                    
                    const cleanText = lockedTarget.text.trim().replace(/\n/g, ' ');
                    ui.source.value = cleanText;
                    ui.inject.value = cleanText;
                    ui.btnExec.disabled = false;
                    
                    extractColors(lockedTarget.bbox);
                    log('Target Signature Locked. Enter Injection Payload.');
                    renderView();
                }
            };
        }

        function renderView() {
            // Restore from memory
            ctx.drawImage(memCanvas, 0, 0);
            
            // Draw hover rect
            if(hoverTarget && !lockedTarget) {
                ctx.fillStyle = 'rgba(167, 139, 250, 0.2)';
                ctx.fillRect(hoverTarget.bbox.x0, hoverTarget.bbox.y0, hoverTarget.bbox.x1 - hoverTarget.bbox.x0, hoverTarget.bbox.y1 - hoverTarget.bbox.y0);
                canvas.style.cursor = 'pointer';
            } else {
                canvas.style.cursor = 'crosshair';
            }

            // Draw locked rect
            if(lockedTarget) {
                const b = lockedTarget.bbox;
                ctx.strokeStyle = '#a78bfa';
                ctx.lineWidth = 3;
                ctx.strokeRect(b.x0 - 4, b.y0 - 4, (b.x1 - b.x0) + 8, (b.y1 - b.y0) + 8);
                
                // Add lock icon/corner accents
                ctx.fillStyle = '#a78bfa';
                ctx.fillRect(b.x0 - 6, b.y0 - 6, 12, 12);
                ctx.fillRect(b.x1 - 6, b.y0 - 6, 12, 12);
                ctx.fillRect(b.x0 - 6, b.y1 - 6, 12, 12);
                ctx.fillRect(b.x1 - 6, b.y1 - 6, 12, 12);
            }
        }

        // --- Advanced Color Engine ---
        let currentColors = { bg: 'rgb(0,0,0)', text: 'rgb(255,255,255)' };

        function extractColors(bbox) {
            const mCtx = memCanvas.getContext('2d', {willReadFrequently:true});
            const p = 4; // padding sample
            
            // Background sampling from edges
            const bgPixels = [];
            const w = bbox.x1 - bbox.x0;
            const h = bbox.y1 - bbox.y0;

            try {
                // Top & Bottom strips
                bgPixels.push(...mCtx.getImageData(bbox.x0, Math.max(0, bbox.y0 - p), w, p).data);
                bgPixels.push(...mCtx.getImageData(bbox.x0, bbox.y1, w, p).data);
            } catch(e){}

            let r=0, g=0, b=0, count=0;
            for(let i=0; i<bgPixels.length; i+=4) {
                r+=bgPixels[i]; g+=bgPixels[i+1]; b+=bgPixels[i+2]; count++;
            }
            const bgR = count ? Math.round(r/count) : 0;
            const bgG = count ? Math.round(g/count) : 0;
            const bgB = count ? Math.round(b/count) : 0;

            currentColors.bg = `rgb(${bgR},${bgG},${bgB})`;
            
            // Update UI
            const hexBG = rgbToHex(bgR, bgG, bgB);
            ui.bgSwatch.style.background = hexBG;
            ui.bgHex.innerText = hexBG;

            // Text color sampling (highest contrast)
            let maxDist = 0;
            let tr=255, tg=255, tb=255;
            try {
                const textData = mCtx.getImageData(bbox.x0, bbox.y0, w, h).data;
                for(let i=0; i<textData.length; i+=4) {
                    const pr = textData[i], pg = textData[i+1], pb = textData[i+2];
                    const dist = Math.abs(pr-bgR) + Math.abs(pg-bgG) + Math.abs(pb-bgB);
                    if(dist > maxDist) {
                        maxDist = dist; tr = pr; tg = pg; tb = pb;
                    }
                }
            } catch(e){}

            currentColors.text = `rgb(${tr},${tg},${tb})`;
            const hexText = rgbToHex(tr, tg, tb);
            ui.textSwatch.style.background = hexText;
            ui.textHex.innerText = hexText;
        }

        // --- Injection Execution ---
        function executeInjection() {
            if(!lockedTarget) return;

            const payload = ui.inject.value;
            const b = lockedTarget.bbox;
            const targetHeight = b.y1 - b.y0;
            const targetWidth = b.x1 - b.x0;
            
            const mCtx = memCanvas.getContext('2d', {willReadFrequently:true});

            // 1. Wipe Original Matrix Area
            mCtx.fillStyle = currentColors.bg;
            // Pad slightly to remove artifacts
            const padY = targetHeight * 0.15;
            const padX = targetWidth * 0.05;
            mCtx.fillRect(b.x0 - padX, b.y0 - padY, targetWidth + (padX*2), targetHeight + (padY*2));

            // 2. Compute Exact Typography Metrics
            // Fallback to standard sans-serif to avoid font rendering glitches
            let fontSize = targetHeight * 0.82; 
            mCtx.font = `600 ${fontSize}px Arial, sans-serif`;
            mCtx.fillStyle = currentColors.text;
            mCtx.textBaseline = 'top';

            // Check if string fits width, if not, compress horizontally
            const textMetrics = mCtx.measureText(payload);
            let scaleX = 1;
            if(textMetrics.width > (targetWidth + padX)) {
                scaleX = (targetWidth + padX) / textMetrics.width;
            }

            // 3. Inject
            mCtx.save();
            mCtx.translate(b.x0, b.y0 + (targetHeight * 0.08)); // Vertical tweak
            mCtx.scale(scaleX, 1);
            mCtx.fillText(payload, 0, 0);
            mCtx.restore();

            // Clear lock and refresh
            lockedTarget = null;
            ui.source.value = ''; ui.inject.value = '';
            ui.btnExec.disabled = true;
            log('Override Injected Successfully.');
            renderView();
        }

        function exportPayload() {
            if(!memCanvas) return;
            const link = document.createElement('a');
            link.download = `DAITYA_OS_PAYLOAD_${Date.now()}.png`;
            link.href = memCanvas.toDataURL('image/png', 1.0);
            link.click();
            log('Payload Data Exfiltrated (Downloaded).');
        }
    </script>
</body>
    </html>
