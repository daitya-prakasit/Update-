<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Hindi Supported Image Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #eab308; --primary-hover: #ca8a04; --success: #22c55e; --success-hover: #16a34a; --bg: #111827; --surface: #1f2937; --border: #374151; --text: #f9fafb; --text-muted: #9ca3af; }
        body { font-family: 'Hind', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--surface); border-radius: 16px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); padding: 30px; border: 1px solid var(--border); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0 0 10px 0; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: var(--text-muted); margin: 0; font-size: 14px; }
        
        .upload-section { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 12px; background: #111827; margin-bottom: 25px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--primary); }
        input[type="file"] { font-size: 15px; color: var(--text); }

        .editor-panels { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .control-panel { background: #111827; padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .control-panel h3 { margin-top: 0; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        input[type="text"] { padding: 12px; background: #1f2937; color: white; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s; font-family: 'Hind', sans-serif;}
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2); }

        .btn { background: var(--primary); color: #000; border: none; padding: 14px 20px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Hind', sans-serif; margin-bottom: 10px;}
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; transform: none; }
        
        .btn-success { background: var(--success); color: white;}
        .btn-success:hover { background: var(--success-hover); }

        #status { text-align: center; padding: 15px; border-radius: 8px; background: #000; color: #eab308; font-weight: bold; margin-bottom: 20px; display: none; font-size: 13px; border: 1px solid #eab308;}
        
        .result-panel { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center; position: relative;}
        canvas { max-width: 100%; height: auto; display: block; }

        .color-preview-box { display: flex; gap: 10px; margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); margin-bottom: 15px;}
        .color-sample { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); }
        .color-label { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 6px; font-weight: bold;}

        @media (max-width: 768px) { .editor-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>DAITYA Dual-Lang Terminal</h1>
            <p>Module: Hindi/Eng OCR | Auto-Color | Size Match | Output Downloader</p>
        </div>

        <div id="status">> System initialized. Waiting for payload (Image).</div>

        <div class="upload-section">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="editor-panels">
            <div class="control-panel">
                <h3>Replacement Parameters</h3>
                <div class="input-group">
                    <label>Target Text (Hindi / Eng Exact Match)</label>
                    <input type="text" id="oldText" placeholder="e.g. रुको ya STOP">
                </div>
                <div class="input-group">
                    <label>Injection Text (Hindi / Eng)</label>
                    <input type="text" id="newText" placeholder="e.g. चलो ya GO">
                </div>
                
                <button class="btn" id="btnReplace" onclick="processTextReplacement()" disabled>
                    [ EXECUTE OVERRIDE ]
                </button>

                <div class="color-preview-box">
                    <div>
                        <div id="sampleBackground" class="color-sample" style="background: #000;"></div>
                        <div class="color-label">BG MASK</div>
                    </div>
                    <div>
                        <div id="sampleText" class="color-sample" style="background: #fff;"></div>
                        <div class="color-label">TEXT HEX</div>
                    </div>
                </div>

                <button class="btn btn-success" id="btnDownload" onclick="downloadImage()" disabled>
                    [ DOWNLOAD OUTPUT ]
                </button>
            </div>
            
            <div class="result-panel">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let originalCanvas = null; 
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        function logStatus(msg) {
            statusEl.style.display = 'block';
            statusEl.innerText = '> ' + msg;
        }

        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        canvas.width = currentImage.width;
                        canvas.height = currentImage.height;
                        ctx.drawImage(currentImage, 0, 0);
                        
                        originalCanvas = document.createElement('canvas');
                        originalCanvas.width = currentImage.width;
                        originalCanvas.height = currentImage.height;
                        originalCanvas.getContext('2d').drawImage(currentImage, 0, 0);

                        logStatus('Image parsed into memory. Enter parameters.');
                        document.getElementById('btnReplace').disabled = false;
                        document.getElementById('btnDownload').disabled = false;
                    };
                    currentImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        async function processTextReplacement() {
            if (!currentImage || !originalCanvas) return;
            const oldTextTarget = document.getElementById('oldText').value.trim();
            const newTextData = document.getElementById('newText').value;

            if (!oldTextTarget) {
                logStatus('ERROR: Missing target text.');
                return;
            }

            try {
                ctx.drawImage(originalCanvas, 0, 0);
                logStatus('Deploying Hindi+Eng OCR Engine... (Please wait if first run)');
                document.getElementById('btnReplace').disabled = true;

                // DAITYA BYPASS: Added 'hin' (Hindi) to OCR language parameters.
                const { data: { words } } = await Tesseract.recognize(
                    originalCanvas, 'eng+hin', { logger: m => console.log(m.status + " " + Math.round(m.progress * 100) + "%") }
                );

                const targetWord = words.find(w => w.text.trim() === oldTextTarget);

                if (!targetWord) {
                    logStatus(`ERROR: Target [${oldTextTarget}] not located. Make sure the word is clear in image.`);
                    document.getElementById('btnReplace').disabled = false;
                    return;
                }

                logStatus(`Target locked. Executing color & dimensional analysis...`);
                const bbox = targetWord.bbox;
                const { x0, y0, x1, y1 } = bbox;
                const width = x1 - x0;
                const targetHeight = y1 - y0;

                const { backgroundColor, textColor } = analyzeBBoxColors(bbox, originalCanvas);
                document.getElementById('sampleBackground').style.background = backgroundColor;
                document.getElementById('sampleText').style.background = textColor;

                // Erase Old Text
                ctx.fillStyle = backgroundColor;
                const maskPadding = targetHeight * 0.1; 
                ctx.fillRect(x0 - maskPadding, y0 - maskPadding, width + (maskPadding*2), targetHeight + (maskPadding*2));

                // DAITYA BYPASS: Hindi font applied for exact rendering
                let fontSize = targetHeight; 
                ctx.font = `600 ${fontSize}px 'Hind', sans-serif`;
                
                let metrics = ctx.measureText(newTextData);
                let actualRenderedHeight = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
                
                if (actualRenderedHeight > 0) {
                    let scaleFactor = targetHeight / actualRenderedHeight;
                    fontSize = fontSize * scaleFactor * 0.85; 
                }

                ctx.font = `600 ${fontSize}px 'Hind', sans-serif`;
                ctx.fillStyle = textColor;
                ctx.textBaseline = 'top';
                ctx.fillText(newTextData, x0, y0 + (targetHeight * 0.05));

                logStatus(`OVERRIDE COMPLETE. Injected [${newTextData}] successfully.`);
                document.getElementById('btnReplace').disabled = false;

            } catch (err) {
                logStatus('CRITICAL ERROR: ' + err.message);
                document.getElementById('btnReplace').disabled = false;
            }
        }

        function analyzeBBoxColors(bbox, sourceCanvas) {
            const { x0, y0, x1, y1 } = bbox;
            const w = x1 - x0;
            const h = y1 - y0;
            const tempCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
            
            const p = Math.max(2, Math.round(h * 0.4)); 
            const bgAreas = [
                { x: Math.max(0, x0 - p), y: y0, w: p, h: h },
                { x: x1, y: y0, w: p, h: h },
                { x: x0, y: Math.max(0, y0 - p), w: w, h: p },
                { x: x0, y: y1, w: w, h: p }
            ];

            const bgAvg = calculateAverageColor(bgAreas, tempCtx);
            const bgRGB = bgAvg.match(/\d+/g).map(Number);
            const textData = tempCtx.getImageData(x0, y0, w, h).data;
            const textRGB = getHighestContrastColor(textData, bgRGB);

            return { backgroundColor: bgAvg, textColor: textRGB };
        }

        function calculateAverageColor(rects, context) {
            let r=0, g=0, b=0, count=0;
            rects.forEach(rect => {
                if (rect.w > 0 && rect.h > 0) {
                    const data = context.getImageData(rect.x, rect.y, rect.w, rect.h).data;
                    for (let i = 0; i < data.length; i += 4) {
                        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                    }
                }
            });
            if (count === 0) return 'rgb(255,255,255)';
            return `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
        }

        function getHighestContrastColor(pixels, bgColor) {
            let maxContrast = [0,0,0];
            let maxDistance = -1;
            for (let i = 0; i < pixels.length; i += 8) { 
                const pr = pixels[i], pg = pixels[i+1], pb = pixels[i+2];
                const distance = Math.sqrt(Math.pow(pr - bgColor[0], 2) + Math.pow(pg - bgColor[1], 2) + Math.pow(pb - bgColor[2], 2));
                if (distance > maxDistance) {
                    maxDistance = distance;
                    maxContrast = [pr, pg, pb];
                }
            }
            if (maxDistance < 20) return `rgb(0,0,0)`; 
            return `rgb(${maxContrast[0]}, ${maxContrast[1]}, ${maxContrast[2]})`;
        }

        function downloadImage() {
            if (!currentImage) return;
            const link = document.createElement('a');
            link.download = 'DAITYA_Output_Image.png';
            link.href = canvas.toDataURL('image/png', 1.0); 
            link.click();
            logStatus('Payload output downloaded successfully.');
        }
    </script>
</body>
</html>
