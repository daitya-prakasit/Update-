<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Elite Execution Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        :root { --primary: #8b5cf6; --primary-hover: #7c3aed; --ai: #ec4899; --ai-hover: #db2777; --success: #10b981; --success-hover: #059669; --bg: #09090b; --surface: #18181b; --border: #27272a; --text: #f4f4f5; --text-muted: #a1a1aa; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--surface); border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); padding: 30px; border: 1px solid var(--border); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0 0 5px 0; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: var(--text-muted); margin: 0; font-size: 13px; font-family: monospace;}
        
        .upload-section { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 8px; background: #09090b; margin-bottom: 25px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--primary); }
        input[type="file"] { font-size: 14px; color: var(--text); }

        .editor-panels { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .control-panel { background: #09090b; padding: 25px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .control-panel h3 { margin-top: 0; color: var(--text); font-size: 16px; margin-bottom: 20px;}
        
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        input[type="text"], input[type="password"] { padding: 12px; background: #18181b; color: white; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; transition: 0.2s; font-family: monospace;}
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--primary); }

        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 6px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:disabled { background: #27272a; color: #52525b; cursor: not-allowed; }
        
        .btn-ai { background: var(--ai); margin-bottom: 20px; }
        .btn-ai:hover:not(:disabled) { background: var(--ai-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover:not(:disabled) { background: var(--success-hover); }

        .ai-section { border: 1px solid rgba(236, 72, 153, 0.3); padding: 15px; border-radius: 6px; margin-bottom: 20px; background: rgba(236, 72, 153, 0.05); }
        
        #status { font-family: monospace; text-align: left; padding: 15px; border-radius: 6px; background: #000; color: #10b981; font-weight: bold; margin-bottom: 20px; display: none; font-size: 12px; border: 1px solid #10b981; word-wrap: break-word; max-height: 150px; overflow-y: auto; }
        
        .result-panel { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; display: block; }

        .color-preview-box { display: flex; gap: 15px; margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); margin-bottom: 15px;}
        .color-sample { width: 45px; height: 45px; border-radius: 6px; border: 1px solid var(--border); }
        .color-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 8px; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 768px) { .editor-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>DAITYA Execution Terminal</h1>
            <p>[ MODULE: STEALTH AI INJECTION & DEEP OCR V2.0 ]</p>
        </div>

        <div id="status"></div>

        <div class="upload-section">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="editor-panels">
            <div class="control-panel">
                <h3>PAYLOAD CONFIGURATION</h3>
                
                <div class="ai-section">
                    <div class="input-group">
                        <label>Gemini Neural Key</label>
                        <input type="password" id="apiKey" placeholder="AI API Key">
                    </div>
                    <div class="input-group">
                        <label>Target String (To Find)</label>
                        <input type="text" id="oldText" placeholder="e.g. TARGET">
                    </div>
                    <div class="input-group">
                        <label>AI Prompt (Directive)</label>
                        <input type="text" id="aiPrompt" placeholder="e.g. Translate context to Hindi">
                    </div>
                    <button class="btn btn-ai" id="btnAiGenerate" disabled>
                        [ GENERATE AI PAYLOAD ]
                    </button>
                </div>

                <div class="input-group">
                    <label>Injection Text (Ready to deploy)</label>
                    <input type="text" id="newText" placeholder="Waiting for AI output or manual input...">
                </div>
                
                <button class="btn" id="btnReplace" disabled>
                    [ EXECUTE OVERRIDE ]
                </button>

                <div class="color-preview-box">
                    <div>
                        <div id="sampleBackground" class="color-sample" style="background: #000;"></div>
                        <div class="color-label">BG MASK</div>
                    </div>
                    <div>
                        <div id="sampleText" class="color-sample" style="background: #fff;"></div>
                        <div class="color-label">TEXT HEX</div>
                    </div>
                </div>

                <button class="btn btn-success" id="btnDownload" disabled>
                    [ EXTRACT OUTPUT ]
                </button>
            </div>
            
            <div class="result-panel">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // System State
        const SYSTEM = {
            image: null,
            originalCanvas: null,
            canvas: document.getElementById('outputCanvas'),
            ctx: document.getElementById('outputCanvas').getContext('2d', { willReadFrequently: true }),
            statusEl: document.getElementById('status')
        };

        const UI = {
            btnAi: document.getElementById('btnAiGenerate'),
            btnReplace: document.getElementById('btnReplace'),
            btnDownload: document.getElementById('btnDownload'),
            upload: document.getElementById('uploadImage'),
            apiKey: document.getElementById('apiKey'),
            oldText: document.getElementById('oldText'),
            newText: document.getElementById('newText'),
            aiPrompt: document.getElementById('aiPrompt'),
            bgSample: document.getElementById('sampleBackground'),
            textSample: document.getElementById('sampleText')
        };

        // Terminal Logger
        const log = (msg, type = "INFO") => {
            SYSTEM.statusEl.style.display = 'block';
            const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
            SYSTEM.statusEl.innerHTML += `<div style="margin-bottom:4px; color:${type === 'CRITICAL' ? '#ef4444' : (type === 'SUCCESS' ? '#10b981' : '#3b82f6')}">[${timestamp}] [${type}] ${msg}</div>`;
            SYSTEM.statusEl.scrollTop = SYSTEM.statusEl.scrollHeight;
        };

        const stealthDelay = (min = 500, max = 1500) => new Promise(res => setTimeout(res, Math.floor(Math.random() * (max - min + 1) + min)));

        // Text Sanitizer for Master Match (Removes Punctuation/Noise)
        const sanitizeText = (str) => str.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();

        UI.upload.addEventListener('change', (e) => {
            try {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    SYSTEM.image = new Image();
                    SYSTEM.image.onload = () => {
                        SYSTEM.canvas.width = SYSTEM.image.width;
                        SYSTEM.canvas.height = SYSTEM.image.height;
                        SYSTEM.ctx.drawImage(SYSTEM.image, 0, 0);
                        
                        SYSTEM.originalCanvas = document.createElement('canvas');
                        SYSTEM.originalCanvas.width = SYSTEM.image.width;
                        SYSTEM.originalCanvas.height = SYSTEM.image.height;
                        SYSTEM.originalCanvas.getContext('2d').drawImage(SYSTEM.image, 0, 0);

                        log('Image matrix loaded. Deep Scan available.', 'SUCCESS');
                        UI.btnReplace.disabled = false;
                        UI.btnDownload.disabled = false;
                        UI.btnAi.disabled = false;
                    };
                    SYSTEM.image.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } catch (err) {
                log(`Image parsing failed: ${err.message}`, 'CRITICAL');
            }
        });

        UI.btnAi.addEventListener('click', async () => {
            const key = UI.apiKey.value.trim();
            const target = UI.oldText.value.trim();
            const prompt = UI.aiPrompt.value.trim();

            if (!key || !target || !prompt) return log('Missing Neural Config. Require Key, Target, and Prompt.', 'CRITICAL');

            try {
                UI.btnAi.disabled = true;
                log('Initiating secure handshake with Gemini Engine...', 'INFO');
                await stealthDelay(800, 1500);

                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const sysInstruction = `You are an automated payload generator. Alter text exactly as instructed. Output MUST be the raw text string only. No explanation. No quotes.`;
                const query = `${sysInstruction}\n\nTask: ${prompt}\nOriginal: "${target}"\nReplacement:`;
                
                const result = await model.generateContent(query);
                UI.newText.value = result.response.text().trim().replace(/^"|"$/g, '');
                
                log(`AI Payload Generated: [ ${UI.newText.value} ]`, 'SUCCESS');
            } catch (err) {
                log(`AI ENGINE FAILURE: ${err.message}`, 'CRITICAL');
            } finally {
                UI.btnAi.disabled = false;
            }
        });

        // MASTER-LEVEL OCR OVERRIDE V2.0
        UI.btnReplace.addEventListener('click', async () => {
            if (!SYSTEM.image || !SYSTEM.originalCanvas) return;
            
            const targetStr = UI.oldText.value.trim();
            const injectStr = UI.newText.value;

            if (!targetStr || !injectStr) return log('Missing Execution Parameters.', 'CRITICAL');

            try {
                UI.btnReplace.disabled = true;
                SYSTEM.ctx.drawImage(SYSTEM.originalCanvas, 0, 0); 
                log('Initializing Deep OCR Engine. Scanning pixel data...', 'INFO');
                
                const { data: { words } } = await Tesseract.recognize(
                    SYSTEM.originalCanvas, 'eng', { logger: m => { if(m.status === 'recognizing text' && m.progress === 1) log('OCR Matrix Scan 100%. Processing data...', 'INFO') } }
                );

                const cleanTarget = sanitizeText(targetStr);
                
                // Advanced Fuzzy Search Logic
                const targetWord = words.find(w => {
                    const cleanW = sanitizeText(w.text);
                    return cleanW.length > 1 && (cleanW.includes(cleanTarget) || cleanTarget.includes(cleanW));
                });

                if (!targetWord) {
                    // Fail-safe: Show user what the machine actually read
                    const detectedList = words.slice(0, 8).map(w => w.text).join(', ');
                    throw new Error(`Target [${targetStr}] bypass failed. OCR read: [${detectedList}...]. Check image clarity or spelling.`);
                }

                log(`Target [${targetWord.text}] locked. Extracting profiles...`, 'SUCCESS');
                
                const bbox = targetWord.bbox;
                const { x0, y0, x1, y1 } = bbox;
                const width = x1 - x0;
                const height = y1 - y0;

                const { bg, textCol } = extractColorProfiles(bbox, SYSTEM.originalCanvas);
                UI.bgSample.style.background = bg;
                UI.textSample.style.background = textCol;

                // Erase Logic
                SYSTEM.ctx.fillStyle = bg;
                const pad = height * 0.15; 
                SYSTEM.ctx.fillRect(x0 - pad, y0 - pad, width + (pad * 2.5), height + (pad * 2.5));

                // Injection Formatting
                let fSize = height * 1.05; 
                SYSTEM.ctx.font = `bold ${fSize}px 'Inter', sans-serif`;
                
                let metrics = SYSTEM.ctx.measureText(injectStr);
                let actualH = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
                
                if (actualH > 0) {
                    let scale = height / actualH;
                    fSize = fSize * scale * 0.85; // Adjusted scaling coefficient 
                }

                SYSTEM.ctx.font = `bold ${fSize}px 'Inter', sans-serif`;
                SYSTEM.ctx.fillStyle = textCol;
                SYSTEM.ctx.textBaseline = 'top';
                
                // Final execution
                SYSTEM.ctx.fillText(injectStr, x0, y0 + (height * 0.08));

                log(`OVERRIDE COMPLETE. Memory block rewritten.`, 'SUCCESS');

            } catch (err) {
                log(`EXECUTION HALTED: ${err.message}`, 'CRITICAL');
            } finally {
                UI.btnReplace.disabled = false;
            }
        });

        function extractColorProfiles(bbox, source) {
            const { x0, y0, x1, y1 } = bbox;
            const w = x1 - x0; const h = y1 - y0;
            const tmpCtx = source.getContext('2d', { willReadFrequently: true });
            
            const p = Math.max(2, Math.round(h * 0.4)); 
            const bgAreas = [
                { x: Math.max(0, x0 - p), y: y0, w: p, h: h }, { x: x1, y: y0, w: p, h: h },
                { x: x0, y: Math.max(0, y0 - p), w: w, h: p }, { x: x0, y: y1, w: w, h: p }
            ];

            let r=0, g=0, b=0, count=0;
            bgAreas.forEach(rect => {
                if (rect.w > 0 && rect.h > 0) {
                    const data = tmpCtx.getImageData(rect.x, rect.y, rect.w, rect.h).data;
                    for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
                }
            });
            
            const bgRGB = count === 0 ? [255,255,255] : [Math.round(r/count), Math.round(g/count), Math.round(b/count)];
            
            const textData = tmpCtx.getImageData(x0, y0, w, h).data;
            let maxC = [0,0,0], maxD = -1;
            
            for (let i = 0; i < textData.length; i += 8) { 
                const pr = textData[i], pg = textData[i+1], pb = textData[i+2];
                const dist = Math.sqrt(Math.pow(pr - bgRGB[0], 2) + Math.pow(pg - bgRGB[1], 2) + Math.pow(pb - bgRGB[2], 2));
                if (dist > maxD) { maxD = dist; maxC = [pr, pg, pb]; }
            }
            
            return { 
                bg: `rgb(${bgRGB[0]}, ${bgRGB[1]}, ${bgRGB[2]})`, 
                textCol: maxD < 20 ? `rgb(0,0,0)` : `rgb(${maxC[0]}, ${maxC[1]}, ${maxC[2]})` 
            };
        }

        UI.btnDownload.addEventListener('click', () => {
            if (!SYSTEM.image) return;
            const link = document.createElement('a');
            link.download = `DAITYA_PAYLOAD_${Date.now()}.png`;
            link.href = SYSTEM.canvas.toDataURL('image/png', 1.0);
            link.click();
            log('Data block extracted to local storage.', 'SUCCESS');
        });
    </script>
</body>
</html>
