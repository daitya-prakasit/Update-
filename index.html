<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Ultra Pro Sniper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --primary-hover: #059669; --bg: #09090b; --panel: #18181b; --border: #27272a; --text: #f4f4f5; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .header p { color: #a1a1aa; margin: 0; font-size: 14px; }
        
        .toolbar { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 1050px; justify-content: center;}
        
        input[type="file"] { color: var(--text); font-size: 14px; cursor: pointer; width: 190px;}
        select, input[type="text"] { background: #27272a; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; outline: none; font-family: inherit;}
        input[type="color"] { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; height: 35px; width: 45px; padding: 2px; }
        input[type="number"] { background: #27272a; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; width: 60px; outline: none;}

        button { background: #3f3f46; color: #fff; border: 1px solid #52525b; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;}
        button:hover { background: #52525b; transform: translateY(-1px);}
        button:disabled { background: #18181b; color: #52525b; border-color: #27272a; cursor: not-allowed; transform: none;}
        
        .btn-snip { background: #ef4444; border-color: #ef4444; color: white;}
        .btn-snip:hover { background: #dc2626; border-color: #dc2626;}
        .btn-snip.active { background: #22c55e; border-color: #22c55e; animation: pulse 1.5s infinite; }
        .btn-green { background: var(--primary); border-color: var(--primary); }
        .btn-green:hover { background: var(--primary-hover); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        #status { background: var(--panel); border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 1050px; text-align: center; }
        .status-scanning { background: #78350f !important; border-color: #d97706 !important; color: #fde68a !important; }
        
        .canvas-container-wrapper { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; }
        
        .icon-btn { padding: 8px 12px; font-size: 16px; }
        .tool-group { display: flex; align-items: center; gap: 8px; padding: 0 10px; border-right: 1px solid var(--border); }
        .tool-group:last-child { border-right: none; }
        .active-bold { background: var(--text) !important; color: var(--bg) !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DAITYA ULTRA PRO</h1>
        <p>Smart Auto-Detect • Perfect Masking • Instant Live Edit</p>
    </div>

    <div id="status">> SYSTEM READY. WAITING FOR IMAGE TARGET.</div>

    <div class="toolbar">
        <div class="tool-group">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="tool-group">
            <button class="btn-snip" id="btnDraw" onclick="toggleDrawMode()" disabled>✂️ Draw Box</button>
        </div>
        
        <div class="tool-group">
            <select id="fontFamily" title="Base Font Match">
                <option value="Roboto">Roboto</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times</option>
                <option value="Verdana">Verdana</option>
            </select>
        </div>

        <div class="tool-group">
            <input type="color" id="textColor" value="#ffffff" disabled title="Text Color">
            <input type="number" id="textSize" value="20" disabled title="Font Size">
            <button class="icon-btn" id="btnBold" onclick="toggleSelectedBold()" disabled title="Toggle Bold"><b>B</b></button>
            <button class="icon-btn" id="btnDelete" onclick="deleteSelected()" disabled title="Delete Node">🗑️</button>
        </div>

        <button class="btn-green" id="btnDownload" onclick="downloadImage()" disabled style="margin-left: auto;">⬇ DOWNLOAD OUTPUT</button>
    </div>

    <div class="canvas-container-wrapper">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let canvas = new fabric.Canvas('editorCanvas', { selection: true });
        let originalImageElement = null; 
        let tempCanvasContext = null;

        let isDrawingMode = false;
        let isMouseDown = false;
        let selectionRect = null;
        let startX, startY;

        function logStatus(msg, isScanning = false) { 
            statusEl.innerText = '> ' + msg; 
            if(isScanning) statusEl.classList.add('status-scanning');
            else statusEl.classList.remove('status-scanning');
        }

        // LOAD IMAGE
        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        canvas.clear();
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        
                        originalImageElement = new Image();
                        originalImageElement.src = f.target.result;
                        originalImageElement.onload = () => {
                            let tempCanvas = document.createElement('canvas');
                            tempCanvas.width = img.width;
                            tempCanvas.height = img.height;
                            tempCanvasContext = tempCanvas.getContext('2d', { willReadFrequently: true });
                            tempCanvasContext.drawImage(originalImageElement, 0, 0);
                        };
                        
                        document.getElementById('btnDraw').disabled = false;
                        document.getElementById('btnDownload').disabled = false;
                        logStatus('TARGET ACQUIRED. Click [✂️ Draw Box] to isolate text node.');
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // DRAW BOX LOGIC
        function toggleDrawMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('btnDraw');
            
            if (isDrawingMode) {
                btn.classList.add('active');
                btn.innerText = 'DRAWING ACTIVE...';
                canvas.defaultCursor = 'crosshair';
                canvas.selection = false; 
                canvas.discardActiveObject();
                canvas.renderAll();
                logStatus('MODE: DRAW. Isolate exact text bounds.');
            } else {
                btn.classList.remove('active');
                btn.innerText = '✂️ Draw Box';
                canvas.defaultCursor = 'default';
                canvas.selection = true;
                logStatus('MODE: EDIT.');
            }
        }

        canvas.on('mouse:down', function(o) {
            if (!isDrawingMode) return;
            isMouseDown = true;
            let pointer = canvas.getPointer(o.e);
            startX = pointer.x;
            startY = pointer.y;

            selectionRect = new fabric.Rect({
                left: startX, top: startY, width: 0, height: 0,
                fill: 'rgba(16, 185, 129, 0.2)',
                stroke: '#10b981', strokeWidth: 1, strokeDashArray: [3, 3],
                selectable: false, evented: false
            });
            canvas.add(selectionRect);
        });

        canvas.on('mouse:move', function(o) {
            if (!isDrawingMode || !isMouseDown) return;
            let pointer = canvas.getPointer(o.e);
            
            if(startX > pointer.x) { selectionRect.set({ left: Math.abs(pointer.x) }); }
            if(startY > pointer.y) { selectionRect.set({ top: Math.abs(pointer.y) }); }
            
            selectionRect.set({ width: Math.abs(startX - pointer.x) });
            selectionRect.set({ height: Math.abs(startY - pointer.y) });
            canvas.renderAll();
        });

        canvas.on('mouse:up', function(o) {
            if (!isDrawingMode || !isMouseDown) return;
            isMouseDown = false;
            
            if (selectionRect.width > 10 && selectionRect.height > 10) {
                processDrawnBox(selectionRect);
            } else {
                canvas.remove(selectionRect); 
            }
            toggleDrawMode(); 
        });

        // CORE ENGINE: EXTRACT, ANALYZE, INJECT
        async function processDrawnBox(rectObj) {
            let x = Math.round(rectObj.left);
            let y = Math.round(rectObj.top);
            let w = Math.round(rectObj.width);
            let h = Math.round(rectObj.height);

            canvas.remove(rectObj);

            // 1. ADVANCED ANALYSIS (Color, Thickness/Bold Detection)
            let analysis = extractData(x, y, w, h);
            
            // 2. CROP FOR OCR
            let cropCanvas = document.createElement('canvas');
            cropCanvas.width = w; cropCanvas.height = h;
            let cropCtx = cropCanvas.getContext('2d');
            cropCtx.drawImage(originalImageElement, x, y, w, h, 0, 0, w, h);
            let croppedBase64 = cropCanvas.toDataURL('image/png');

            logStatus('ANALYZING NODE... EXECUTING AI OCR.', true);

            try {
                // 3. OCR EXECUTION
                const result = await Tesseract.recognize(croppedBase64, 'eng');
                let extractedText = result.data.text.trim();
                if (!extractedText) extractedText = "Edit Me";

                // 4. MASK INJECTION
                let maskRect = new fabric.Rect({
                    left: x, top: y, width: w + 2, height: h + 2, // Slight padding to kill anti-aliasing
                    fill: analysis.bgColor, selectable: false, evented: false
                });
                canvas.add(maskRect);
                maskRect.sendToBack();

                // 5. TEXT INJECTION (Exact Match Parameters)
                let selectedFont = document.getElementById('fontFamily').value;
                let isBold = analysis.isBold ? 'bold' : 'normal';
                
                // Fine-tune font size based on box height to match original scale perfectly
                let exactFontSize = Math.round(h * 0.82);

                let editableText = new fabric.IText(extractedText, {
                    left: x + 1, top: y, 
                    fontSize: exactFontSize, 
                    fontFamily: selectedFont, 
                    fill: analysis.textColor, 
                    fontWeight: isBold,
                    editable: true,
                    lineHeight: 1
                });

                canvas.add(editableText);
                canvas.setActiveObject(editableText);
                editableText.bringToFront();

                // 6. INSTANT EDIT MODE EXECUTION
                editableText.enterEditing();
                editableText.selectAll();
                canvas.renderAll();

                updateToolbarUI(editableText);
                logStatus(`NODE EXTRACTED [${isBold.toUpperCase()}]. TYPE TO REPLACE.`);

            } catch (error) {
                console.error(error);
                logStatus("ERROR: DATA EXTRACTION FAILED.");
            }
        }

        // ULTRA PRO DATA EXTRACTION ENGINE (Color & Weight Heuristics)
        function extractData(x, y, w, h) {
            let imgData = tempCanvasContext.getImageData(x, y, w, h).data;
            
            // Background heuristic: Sample edges
            let r=0, g=0, b=0, edgeCount=0;
            const p = 2; // Border sampling depth
            for (let i = 0; i < w; i++) {
                for (let j = 0; j < h; j++) {
                    if (i < p || i > w - p || j < p || j > h - p) {
                        let idx = (j * w + i) * 4;
                        r += imgData[idx]; g += imgData[idx+1]; b += imgData[idx+2];
                        edgeCount++;
                    }
                }
            }
            let bgR = Math.round(r/edgeCount); let bgG = Math.round(g/edgeCount); let bgB = Math.round(b/edgeCount);
            
            // Foreground (Text) & Weight heuristic
            let maxDist = -1; let txtColor = [0,0,0];
            let textPixelCount = 0; let totalPixels = w * h;

            for (let i = 0; i < imgData.length; i += 4) {
                let dist = Math.sqrt(Math.pow(imgData[i]-bgR, 2) + Math.pow(imgData[i+1]-bgG, 2) + Math.pow(imgData[i+2]-bgB, 2));
                
                // If color is distinctly different from background, it's part of the text
                if (dist > 40) {
                    textPixelCount++;
                }

                // Find highest contrast pixel for text color
                if (dist > maxDist) { 
                    maxDist = dist; txtColor = [imgData[i], imgData[i+1], imgData[i+2]]; 
                }
            }
            
            // Bold Detection Logic: If text takes up > 16% of the bounding box, it's highly likely bold.
            let pixelRatio = textPixelCount / totalPixels;
            let isBoldDetected = pixelRatio > 0.16;

            let bgHex = "#" + (1 << 24 | bgR << 16 | bgG << 8 | bgB).toString(16).slice(1);
            let txtHex = maxDist < 20 ? '#000000' : "#" + (1 << 24 | txtColor[0] << 16 | txtColor[1] << 8 | txtColor[2]).toString(16).slice(1);
            
            return { bgColor: bgHex, textColor: txtHex, isBold: isBoldDetected };
        }

        // UI SYNC
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            document.getElementById('textColor').disabled = true;
            document.getElementById('textSize').disabled = true;
            document.getElementById('btnBold').disabled = true; 
            document.getElementById('btnDelete').disabled = true;
            document.getElementById('btnBold').classList.remove('active-bold');
        });

        function handleSelection(e) {
            if (e.selected && e.selected[0].type === 'i-text') {
                updateToolbarUI(e.selected[0]);
            }
        }

        function updateToolbarUI(obj) {
            document.getElementById('textColor').disabled = false;
            document.getElementById('textSize').disabled = false;
            document.getElementById('btnBold').disabled = false; 
            document.getElementById('btnDelete').disabled = false;
            
            document.getElementById('textColor').value = obj.fill || '#ffffff';
            document.getElementById('textSize').value = Math.round(obj.fontSize) || 20;
            document.getElementById('fontFamily').value = obj.fontFamily || 'Roboto';

            let btnBold = document.getElementById('btnBold');
            if (obj.fontWeight === 'bold' || obj.fontWeight >= 600) {
                btnBold.classList.add('active-bold');
            } else {
                btnBold.classList.remove('active-bold');
            }
        }

        // TOOLBAR ACTIONS
        function toggleSelectedBold() {
            let activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                let currentWeight = activeObj.fontWeight;
                let newWeight = (currentWeight === 'bold' || currentWeight === 600 || currentWeight === 700) ? 'normal' : 'bold';
                activeObj.set('fontWeight', newWeight);
                updateToolbarUI(activeObj);
                canvas.renderAll();
            }
        }

        document.getElementById('textColor').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fill', e.target.value); canvas.renderAll(); }
        });
        document.getElementById('textSize').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fontSize', parseInt(e.target.value)); canvas.renderAll(); }
        });
        document.getElementById('fontFamily').addEventListener('change', function(e) {
            if (canvas.getActiveObject() && canvas.getActiveObject().type === 'i-text') { 
                canvas.getActiveObject().set('fontFamily', e.target.value); 
                canvas.renderAll(); 
            }
        });

        function deleteSelected() {
            if (canvas.getActiveObject()) { 
                canvas.remove(canvas.getActiveObject()); 
                canvas.discardActiveObject();
            }
        }

        function downloadImage() {
            canvas.discardActiveObject(); canvas.renderAll();
            let link = document.createElement('a');
            link.download = 'DAITYA_Output.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 }); 
            link.click();
        }
    </script>
</body>
</html>
