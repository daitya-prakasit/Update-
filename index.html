<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA V4 - NEURAL CORE</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        :root { --primary: #f59e0b; --primary-hover: #d97706; --ai: #ec4899; --ai-hover: #db2777; --success: #10b981; --success-hover: #059669; --bg: #111111; --surface: #1a1a1a; --border: #333333; --text: #e5e5e5; --text-muted: #888888; }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--bg); color: var(--text); margin: 0; padding: 30px; }
        .container { max-width: 1050px; margin: 0 auto; background: var(--surface); border-radius: 8px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px dashed var(--border); padding-bottom: 15px; }
        .header h1 { color: var(--primary); margin: 0 0 10px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; font-size: 28px; }
        .header p { color: var(--text-muted); margin: 0; font-size: 12px; }
        
        .upload-section { border: 1px dashed var(--text-muted); padding: 20px; text-align: center; background: #111; margin-bottom: 25px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--primary); }
        input[type="file"] { font-size: 14px; color: var(--text); outline: none; }

        .editor-panels { display: grid; grid-template-columns: 400px 1fr; gap: 25px; }
        .control-panel { background: #111; padding: 25px; border-radius: 6px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .control-panel h3 { margin-top: 0; color: var(--text); font-size: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .input-group label { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="password"] { padding: 12px; background: #1a1a1a; color: white; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; transition: 0.2s; font-family: inherit;}
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--primary); }

        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; font-family: inherit;}
        .btn:hover:not(:disabled) { background: var(--primary-hover); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: var(--success-hover); }

        #status { font-family: inherit; text-align: left; padding: 15px; border-radius: 4px; background: #000; color: var(--primary); font-weight: bold; margin-bottom: 25px; display: none; font-size: 12px; border: 1px solid #333; max-height: 120px; overflow-y: auto; line-height: 1.4; }
        
        .result-panel { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center; position: relative;}
        canvas { max-width: 100%; height: auto; display: block; }

        .color-preview-box { display: flex; gap: 15px; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); margin-bottom: 15px;}
        .color-sample { width: 35px; height: 35px; border-radius: 4px; border: 1px solid var(--border); }
        .color-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 768px) { .editor-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>DAITYA V4 - NEURAL CORE</h1>
            <p>Module: Levenshtein Fuzzy Matching | Bilingual OCR (Hindi+Eng) | Auto-Color | Scale Bypass</p>
        </div>

        <div id="status"></div>

        <div class="upload-section">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="editor-panels">
            <div class="control-panel">
                <h3>Payload Configuration</h3>
                
                <div class="input-group">
                    <label>Target Text (Hindi/Eng Supported)</label>
                    <input type="text" id="oldText" placeholder="e.g. कविता">
                </div>

                <div class="input-group">
                    <label>Injection Text</label>
                    <input type="text" id="newText" placeholder="e.g. रवि">
                </div>
                
                <button class="btn" id="btnReplace" disabled>
                    [ EXECUTE OVERRIDE ]
                </button>

                <div class="color-preview-box">
                    <div>
                        <div id="sampleBackground" class="color-sample" style="background: #000;"></div>
                        <div class="color-label">BG MASK</div>
                    </div>
                    <div>
                        <div id="sampleText" class="color-sample" style="background: #fff;"></div>
                        <div class="color-label">TEXT HEX</div>
                    </div>
                </div>

                <button class="btn btn-success" id="btnDownload" disabled>
                    [ EXTRACT OUTPUT ]
                </button>
            </div>
            
            <div class="result-panel">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        // System State
        const SYSTEM = {
            image: null,
            originalCanvas: null,
            canvas: document.getElementById('outputCanvas'),
            ctx: document.getElementById('outputCanvas').getContext('2d', { willReadFrequently: true }),
            statusEl: document.getElementById('status')
        };

        const UI = {
            btnReplace: document.getElementById('btnReplace'),
            btnDownload: document.getElementById('btnDownload'),
            upload: document.getElementById('uploadImage'),
            oldText: document.getElementById('oldText'),
            newText: document.getElementById('newText'),
            bgSample: document.getElementById('sampleBackground'),
            textSample: document.getElementById('sampleText')
        };

        // Terminal Logger
        const log = (msg, type = "INFO") => {
            SYSTEM.statusEl.style.display = 'block';
            const color = type === 'CRITICAL' ? '#ef4444' : (type === 'SUCCESS' ? '#10b981' : '#f59e0b');
            SYSTEM.statusEl.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
            SYSTEM.statusEl.scrollTop = SYSTEM.statusEl.scrollHeight;
        };

        // MASTER FIX: Regex now preserves English, Numbers AND Devnagari (Hindi) characters.
        // Strips only random symbols/noise.
        const sanitizeText = (str) => {
            if (!str) return "";
            return str.replace(/[^\w\u0900-\u097F]/gi, '').toLowerCase();
        };

        UI.upload.addEventListener('change', (e) => {
            try {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    SYSTEM.image = new Image();
                    SYSTEM.image.onload = () => {
                        SYSTEM.canvas.width = SYSTEM.image.width;
                        SYSTEM.canvas.height = SYSTEM.image.height;
                        SYSTEM.ctx.drawImage(SYSTEM.image, 0, 0);
                        
                        SYSTEM.originalCanvas = document.createElement('canvas');
                        SYSTEM.originalCanvas.width = SYSTEM.image.width;
                        SYSTEM.originalCanvas.height = SYSTEM.image.height;
                        SYSTEM.originalCanvas.getContext('2d').drawImage(SYSTEM.image, 0, 0);

                        log('Image matrix loaded. Ready for Bilingual Scan.', 'SUCCESS');
                        UI.btnReplace.disabled = false;
                        UI.btnDownload.disabled = false;
                    };
                    SYSTEM.image.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } catch (err) {
                log(`Image parsing failed: ${err.message}`, 'CRITICAL');
            }
        });

        // MASTER-LEVEL OCR OVERRIDE V4.0 (Hindi Support)
        UI.btnReplace.addEventListener('click', async () => {
            if (!SYSTEM.image || !SYSTEM.originalCanvas) return;
            
            const targetStr = UI.oldText.value.trim();
            const injectStr = UI.newText.value.trim();

            if (!targetStr || !injectStr) return log('ERROR: Missing Execution Parameters.', 'CRITICAL');

            try {
                UI.btnReplace.disabled = true;
                SYSTEM.ctx.drawImage(SYSTEM.originalCanvas, 0, 0); 
                log('Initializing Deep OCR Engine (hin+eng)...', 'INFO');
                log('Downloading/Loading Language Packs (May take a moment)...', 'INFO');
                
                // IMPORTANT: 'hin+eng' allows Tesseract to read Hindi and English simultaneously.
                const { data: { words } } = await Tesseract.recognize(
                    SYSTEM.originalCanvas, 'hin+eng', { 
                        logger: m => { 
                            if(m.status === 'recognizing text' && m.progress === 1) {
                                log('Applying Punctuation Stripping & Fuzzy Matrix...', 'INFO');
                            }
                        } 
                    }
                );

                const cleanTarget = sanitizeText(targetStr);
                
                // Advanced Fuzzy Search Logic (Hindi Compatible)
                const targetWord = words.find(w => {
                    const cleanW = sanitizeText(w.text);
                    return cleanW.length > 0 && (cleanW.includes(cleanTarget) || cleanTarget.includes(cleanW) || w.text.includes(targetStr));
                });

                if (!targetWord) {
                    // Extract what Tesseract saw to help the user debug
                    const detectedList = words.slice(0, 15).map(w => w.text.trim()).filter(t => t.length > 1).join(', ');
                    throw new Error(`Target [${targetStr}] not found. OCR detected: [${detectedList}...]. Check spelling.`);
                }

                log(`Target [${targetWord.text}] locked at coordinates. Extracting profiles...`, 'SUCCESS');
                
                const bbox = targetWord.bbox;
                const { x0, y0, x1, y1 } = bbox;
                const width = x1 - x0;
                const height = y1 - y0;

                const { bg, textCol } = extractColorProfiles(bbox, SYSTEM.originalCanvas);
                UI.bgSample.style.background = bg;
                UI.textSample.style.background = textCol;

                // Erase Mask Logic
                SYSTEM.ctx.fillStyle = bg;
                const pad = height * 0.15; 
                SYSTEM.ctx.fillRect(x0 - pad, y0 - pad, width + (pad * 2.5), height + (pad * 2.5));

                // Font Injection (Supports Hindi Rendering)
                let fSize = height * 1.1; 
                SYSTEM.ctx.font = `bold ${fSize}px sans-serif`;
                
                let metrics = SYSTEM.ctx.measureText(injectStr);
                let actualH = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
                
                if (actualH > 0) {
                    let scale = height / actualH;
                    fSize = fSize * scale * 0.85; 
                }

                SYSTEM.ctx.font = `bold ${fSize}px sans-serif`;
                SYSTEM.ctx.fillStyle = textCol;
                SYSTEM.ctx.textBaseline = 'top';
                
                // Execute Override
                SYSTEM.ctx.fillText(injectStr, x0, y0 + (height * 0.08));

                log(`OVERRIDE COMPLETE. Memory block rewritten.`, 'SUCCESS');

            } catch (err) {
                log(`EXECUTION HALTED: ${err.message}`, 'CRITICAL');
            } finally {
                UI.btnReplace.disabled = false;
            }
        });

        // Color Profile Extractor
        function extractColorProfiles(bbox, source) {
            const { x0, y0, x1, y1 } = bbox;
            const w = x1 - x0; const h = y1 - y0;
            const tmpCtx = source.getContext('2d', { willReadFrequently: true });
            
            // Sample edge pixels for background
            const p = Math.max(2, Math.round(h * 0.3)); 
            const bgAreas = [
                { x: Math.max(0, x0 - p), y: y0, w: p, h: h }, { x: x1, y: y0, w: p, h: h },
                { x: x0, y: Math.max(0, y0 - p), w: w, h: p }, { x: x0, y: y1, w: w, h: p }
            ];

            let r=0, g=0, b=0, count=0;
            bgAreas.forEach(rect => {
                if (rect.w > 0 && rect.h > 0) {
                    const data = tmpCtx.getImageData(rect.x, rect.y, rect.w, rect.h).data;
                    for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
                }
            });
            
            const bgRGB = count === 0 ? [255,255,255] : [Math.round(r/count), Math.round(g/count), Math.round(b/count)];
            
            // Scan internal pixels for highest contrast text color
            const textData = tmpCtx.getImageData(x0, y0, w, h).data;
            let maxC = [0,0,0], maxD = -1;
            
            for (let i = 0; i < textData.length; i += 8) { 
                const pr = textData[i], pg = textData[i+1], pb = textData[i+2];
                const dist = Math.sqrt(Math.pow(pr - bgRGB[0], 2) + Math.pow(pg - bgRGB[1], 2) + Math.pow(pb - bgRGB[2], 2));
                if (dist > maxD) { maxD = dist; maxC = [pr, pg, pb]; }
            }
            
            return { 
                bg: `rgb(${bgRGB[0]}, ${bgRGB[1]}, ${bgRGB[2]})`, 
                textCol: maxD < 20 ? `rgb(0,0,0)` : `rgb(${maxC[0]}, ${maxC[1]}, ${maxC[2]})` 
            };
        }

        UI.btnDownload.addEventListener('click', () => {
            if (!SYSTEM.image) return;
            const link = document.createElement('a');
            link.download = `DAITYA_PAYLOAD_${Date.now()}.png`;
            link.href = SYSTEM.canvas.toDataURL('image/png', 1.0);
            link.click();
            log('Data block extracted to local storage.', 'SUCCESS');
        });
    </script>
</body>
    </html>
