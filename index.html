<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Ultimate Manual Override Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --primary-hover: #dc2626; --success: #10b981; --bg: #09090b; --surface: #18181b; --border: #27272a; --text: #fafafa; --text-muted: #a1a1aa; }
        body { font-family: 'Hind', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: var(--surface); border-radius: 12px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 0 30px rgba(239, 68, 68, 0.1); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .header h1 { color: var(--primary); margin: 0 0 5px 0; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .upload-section { border: 2px dashed var(--border); padding: 20px; text-align: center; border-radius: 8px; background: #09090b; margin-bottom: 20px; cursor: pointer; }
        input[type="file"] { font-size: 14px; color: var(--text); }

        .editor-panels { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .control-panel { background: #09090b; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; box-sizing: border-box; padding: 10px; background: #18181b; color: white; border: 1px solid var(--border); border-radius: 6px; font-family: 'Hind', sans-serif; }
        input[type="color"] { width: 100%; height: 40px; border: 1px solid var(--border); border-radius: 6px; background: #18181b; cursor: pointer; padding: 2px;}
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-family: 'Hind', sans-serif;}
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #27272a; color: #52525b; cursor: not-allowed; }
        .btn-success { background: var(--success); }

        #status { text-align: center; padding: 10px; border-radius: 6px; background: #000; color: var(--primary); font-weight: bold; margin-bottom: 15px; font-size: 13px; border: 1px solid var(--primary);}
        
        .result-panel { position: relative; border: 1px solid var(--border); border-radius: 8px; background: #000; overflow: auto; display: flex; justify-content: center; align-items: flex-start; max-height: 700px; cursor: crosshair;}
        canvas { display: block; max-width: 100%; }

        @media (max-width: 768px) { .editor-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>DAITYA Manual Override</h1>
            <p>Module: Drag-to-Select | Custom Size | Custom Color | Hindi & Eng</p>
        </div>

        <div id="status">> Awaiting Image Payload...</div>

        <div class="upload-section">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="editor-panels">
            <div class="control-panel">
                <div class="input-group">
                    <label>1. Target Text Selection</label>
                    <p style="font-size: 11px; color: #ef4444; margin: 0 0 10px 0;">* Mouse se image par old text ke upar ek box draw karo.</p>
                </div>

                <div class="input-group">
                    <label>2. New Text (Hindi / Eng)</label>
                    <input type="text" id="newText" placeholder="नया टेक्स्ट यहाँ लिखें">
                </div>

                <div class="input-group">
                    <label>3. Font Size</label>
                    <input type="number" id="customSize" value="30">
                </div>

                <div class="input-group">
                    <label>4. Text Color</label>
                    <input type="color" id="customColor" value="#ffffff">
                </div>
                
                <button class="btn" id="btnReplace" onclick="executeManualOverride()" disabled>
                    [ INJECT PAYLOAD ]
                </button>

                <button class="btn btn-success" id="btnDownload" onclick="downloadImage()" disabled>
                    [ DOWNLOAD OUTPUT ]
                </button>
            </div>
            
            <div class="result-panel">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let originalCanvas = null; 
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Selection Variables
        let isDrawing = false;
        let startX, startY, currentX, currentY;
        let selectionBox = null; // Stores {x, y, w, h}

        function logStatus(msg) {
            statusEl.innerText = '> ' + msg;
        }

        // 1. Upload Image
        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        canvas.width = currentImage.width;
                        canvas.height = currentImage.height;
                        ctx.drawImage(currentImage, 0, 0);
                        
                        originalCanvas = document.createElement('canvas');
                        originalCanvas.width = currentImage.width;
                        originalCanvas.height = currentImage.height;
                        originalCanvas.getContext('2d').drawImage(currentImage, 0, 0);

                        logStatus('System Ready. Draw a box over the text you want to remove.');
                        document.getElementById('btnReplace').disabled = false;
                        document.getElementById('btnDownload').disabled = false;
                        selectionBox = null;
                    };
                    currentImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Mouse Events for Drag-to-Select
        canvas.addEventListener('mousedown', (e) => {
            if (!currentImage) return;
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            // Calculate scale in case canvas is resized by CSS
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            startX = (e.clientX - rect.left) * scaleX;
            startY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            currentX = (e.clientX - rect.left) * scaleX;
            currentY = (e.clientY - rect.top) * scaleY;

            // Redraw image and draw selection rectangle
            ctx.drawImage(originalCanvas, 0, 0);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            
            // Highlight background slightly
            ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
            ctx.fillRect(startX, startY, currentX - startX, currentY - startY);
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.setLineDash([]); // Reset line dash

            const w = currentX - startX;
            const h = currentY - startY;

            // Handle reverse drawing (bottom-right to top-left)
            const finalX = w < 0 ? currentX : startX;
            const finalY = h < 0 ? currentY : startY;
            const finalW = Math.abs(w);
            const finalH = Math.abs(h);

            if (finalW > 5 && finalH > 5) {
                selectionBox = { x: finalX, y: finalY, w: finalW, h: finalH };
                logStatus(`Target Locked: Box [${Math.round(finalW)}x${Math.round(finalH)}]. Set Text, Size, Color and Inject.`);
            } else {
                ctx.drawImage(originalCanvas, 0, 0); // Clear tiny accidental clicks
                selectionBox = null;
            }
        });

        // 3. Execution Bypass
        function executeManualOverride() {
            if (!currentImage || !originalCanvas) return;
            if (!selectionBox) {
                logStatus('ERROR: No target selected. Draw a box on the image first.');
                return;
            }

            const newTextData = document.getElementById('newText').value;
            const customSize = document.getElementById('customSize').value;
            const customColor = document.getElementById('customColor').value;

            try {
                // Restore original before applying final mask (removes red dashed line)
                ctx.drawImage(originalCanvas, 0, 0);

                const { x, y, w, h } = selectionBox;

                // Auto-calculate background mask color from the edges of the box
                const bgColor = getEdgeAverageColor(x, y, w, h, originalCanvas);

                // Erase Old Text (In-Paint Mask)
                ctx.fillStyle = bgColor;
                ctx.fillRect(x - 2, y - 2, w + 4, h + 4); // Slight padding to ensure old text hides

                // Inject New Text
                ctx.font = `600 ${customSize}px 'Hind', sans-serif`;
                ctx.fillStyle = customColor;
                ctx.textBaseline = 'top';
                
                // Align text inside the box (Left-aligned, vertically centered)
                ctx.fillText(newTextData, x + 2, y + (h/2) - (customSize/2));

                // Save this new state as the original so we can keep editing
                originalCanvas.getContext('2d').drawImage(canvas, 0, 0);
                selectionBox = null; // Reset selection

                logStatus(`PAYLOAD INJECTED. You can draw another box to edit more text.`);

            } catch (err) {
                logStatus('CRITICAL ERROR: ' + err.message);
            }
        }

        // Helper: Get background color from just outside the selection box
        function getEdgeAverageColor(x, y, w, h, sourceCanvas) {
            const tempCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
            let r=0, g=0, b=0, count=0;
            
            // Sample a 5px border around the box to get the background color
            const p = 5; 
            const edges = [
                { ex: Math.max(0, x - p), ey: Math.max(0, y - p), ew: w + p*2, eh: p }, // Top
                { ex: Math.max(0, x - p), ey: y + h, ew: w + p*2, eh: p } // Bottom
            ];

            edges.forEach(rect => {
                if (rect.ew > 0 && rect.eh > 0) {
                    const data = tempCtx.getImageData(rect.ex, rect.ey, rect.ew, rect.eh).data;
                    for (let i = 0; i < data.length; i += 4) {
                        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                    }
                }
            });
            if (count === 0) return '#ffffff';
            return `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
        }

        // 4. Download
        function downloadImage() {
            if (!currentImage) return;
            const link = document.createElement('a');
            link.download = 'DAITYA_Manual_Override.png';
            link.href = canvas.toDataURL('image/png', 1.0); 
            link.click();
            logStatus('Payload output downloaded successfully.');
        }
    </script>
</body>
</html>
